<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c45c26">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Меню</title>
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function () {
      var redirectPath = sessionStorage.getItem('menu-redirect-path');
      if (!redirectPath) return;
      sessionStorage.removeItem('menu-redirect-path');
      if (redirectPath.indexOf('/menu') !== 0) return;
      history.replaceState(null, '', redirectPath);
    })();
  </script>
</head>
<body>
  <div id="app">
    <header class="header">
      <a href="/menu/" class="logo">Меню</a>
      <button type="button" class="nav-toggle" aria-label="Открыть меню" aria-expanded="false"><span></span></button>
      <nav class="nav" id="nav">
        <a href="/menu/">Недели</a>
        <a href="/menu/list/zakupki-na-nedelyu">Закупки</a>
        <a href="/menu/list/zavtraki">Завтраки</a>
        <a href="/menu/list/obedy">Обеды</a>
        <a href="/menu/list/poldnik">Полдник</a>
        <a href="/menu/list/uzhiny">Ужины</a>
        <a href="/menu/tips/zagotovki">Заготовки</a>
      </nav>
      <div class="nav-overlay" id="nav-overlay" aria-hidden="true"></div>
    </header>
    <main id="main" class="main"></main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
